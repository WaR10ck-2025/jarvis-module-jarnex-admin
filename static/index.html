<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jarnex Outdoor Cam Manager</title>
<style>
:root {
  --bg: #0f1419;
  --panel: #1a1f2e;
  --panel2: #232938;
  --border: #2d3548;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #4fc3f7;
  --ok: #4caf50;
  --warn: #ff9800;
  --err: #f44336;
  --backend-lan: #4fc3f7;
  --backend-cloud: #ff9800;
  --backend-rtsp: #4caf50;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: ui-sans-serif, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
header {
  padding: 16px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}
header h1 { margin: 0; font-size: 18px; }
.health-pill {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  background: var(--panel2);
}
.health-pill.ok { color: var(--ok); }
.health-pill.degraded { color: var(--warn); }
main { max-width: 1200px; margin: 0 auto; padding: 24px; }
section {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 24px;
}
section h2 {
  margin: 0 0 12px 0;
  font-size: 15px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.stat {
  background: var(--panel2);
  padding: 12px;
  border-radius: 6px;
  border-left: 3px solid var(--accent);
}
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
.stat-value { font-size: 20px; margin-top: 4px; }
button {
  padding: 8px 14px;
  background: var(--accent);
  color: #062032;
  border: none;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
}
button.secondary { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
button:hover { filter: brightness(1.1); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
input, select {
  padding: 6px 10px;
  background: var(--panel2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: inherit;
  font-size: 14px;
}
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
table { width: 100%; border-collapse: collapse; }
th, td {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
th { font-size: 11px; color: var(--muted); text-transform: uppercase; }
.backend-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.backend-badge.tuya_lan { background: rgba(79,195,247,0.15); color: var(--backend-lan); }
.backend-badge.tuya_cloud { background: rgba(255,152,0,0.15); color: var(--backend-cloud); }
.backend-badge.rtsp { background: rgba(76,175,80,0.15); color: var(--backend-rtsp); }
.empty-state { color: var(--muted); padding: 20px; text-align: center; }
.muted { color: var(--muted); }
pre {
  background: #0a0d12;
  padding: 12px;
  border-radius: 4px;
  overflow-x: auto;
  font-size: 12px;
}

/* Settings Modal */
.modal-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #161a20; border: 1px solid #2a323a; border-radius: 8px;
  width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto;
  padding: 20px;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.modal-header h2 { margin: 0; }
.modal-close { background: none; border: 1px solid #444; color: #ccc; padding: 4px 10px; cursor: pointer; border-radius: 4px; }
.func-section { margin-bottom: 20px; }
.func-section h3 { margin: 10px 0 8px; color: #8ab4f8; font-size: 14px; }
.danger-section h3 { color: #ff5252; }
.danger-section { border: 1px solid rgba(255,82,82,0.3); padding: 10px; border-radius: 6px; background: rgba(255,82,82,0.05); }
.func-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.func-row { background: #0e1116; padding: 8px 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.func-row.danger { background: rgba(255,82,82,0.08); }
.func-label { font-size: 13px; color: #ddd; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.func-label small { color: var(--muted); font-size: 10px; display: block; }
.func-control { flex-shrink: 0; }
.func-control select, .func-control input[type=text] { background: #1a1f26; color: #fff; border: 1px solid #2a323a; padding: 3px 6px; border-radius: 3px; font-size: 12px; }
.func-control input[type=range] { width: 100px; }
.toggle-switch { position: relative; display: inline-block; width: 38px; height: 20px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; transition: .2s; border-radius: 20px; }
.toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .2s; border-radius: 50%; }
input:checked + .toggle-slider { background: var(--ok); }
input:checked + .toggle-slider:before { transform: translateX(18px); }
.slider-value { display: inline-block; min-width: 32px; text-align: right; font-size: 11px; color: var(--muted); margin-left: 4px; }
.danger-action-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
.danger-action-btn:hover { background: #c62828; }

/* Inline-Toggle in Cam-Row (kompakt, mit Label drueber) */
.inline-toggle { display: inline-flex; flex-direction: column; align-items: center; gap: 3px; margin-right: 6px; vertical-align: middle; }
.inline-toggle small { font-size: 10px; color: var(--muted); }
.inline-toggle.on small { color: var(--ok); }
.inline-toggle.private-on small { color: #ff9800; }
</style>
</head>
<body>

<header>
  <h1>Jarnex Outdoor Cam Manager</h1>
  <span id="health-pill" class="health-pill">…</span>
  <span class="muted" id="version-pill"></span>
</header>

<main>

<section>
  <h2>Status</h2>
  <div class="grid" id="status-grid">
    <div class="stat"><div class="stat-label">Cams gesamt</div><div class="stat-value" id="stat-count">…</div></div>
    <div class="stat" style="border-left-color: var(--backend-lan)"><div class="stat-label">Tuya-LAN</div><div class="stat-value" id="stat-lan">…</div></div>
    <div class="stat" style="border-left-color: var(--backend-cloud)"><div class="stat-label">Tuya-Cloud</div><div class="stat-value" id="stat-cloud">…</div></div>
    <div class="stat" style="border-left-color: var(--backend-rtsp)"><div class="stat-label">RTSP</div><div class="stat-value" id="stat-rtsp">…</div></div>
  </div>
</section>

<section>
  <h2>Discovery</h2>
  <div class="row">
    <input id="cidr-input" type="text" value="192.168.10.0/24" style="min-width: 200px" />
    <input id="timeout-input" type="number" value="1.5" step="0.1" style="width: 80px" title="Timeout (s)" />
    <button onclick="runDiscover()">Scan</button>
    <span class="muted" id="discover-status"></span>
  </div>
  <div id="discover-results" style="margin-top: 12px"></div>
</section>

<section>
  <h2>Cameras</h2>
  <div id="cameras-list">
    <div class="empty-state">Lade Cams…</div>
  </div>
</section>

<section>
  <h2>Alarm-Listener</h2>
  <div class="row">
    <button onclick="alarmsStart()">Start</button>
    <button class="secondary" onclick="alarmsStop()">Stop</button>
    <button class="secondary" onclick="refreshAlarmStatus()">Refresh</button>
    <span class="muted" id="alarms-status-text"></span>
  </div>
  <pre id="alarms-status-json" style="margin-top: 12px"></pre>
</section>

<section>
  <h2>Recent Events</h2>
  <button class="secondary" onclick="refreshEvents()">Refresh</button>
  <div id="events-list" style="margin-top: 12px"></div>
</section>

</main>

<!-- Settings Modal: dynamic-rendered Functions-Panel -->
<div id="settings-modal" class="modal-overlay" onclick="if(event.target===this) closeSettings()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="settings-title">Cam-Settings</h2>
      <button class="modal-close" onclick="closeSettings()">Schliessen</button>
    </div>
    <div id="settings-body">Lade...</div>
  </div>
</div>

<script>
const API_BASE = window.location.pathname.replace(/\/ui\/?.*$/, '/api');

async function api(path, opts = {}) {
  const url = API_BASE + path;
  const resp = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(`HTTP ${resp.status}: ${txt}`);
  }
  if (resp.headers.get('content-type')?.includes('application/json')) {
    return await resp.json();
  }
  return await resp.text();
}

async function loadHealth() {
  try {
    const h = await api('/health');
    const pill = document.getElementById('health-pill');
    pill.textContent = h.status;
    pill.className = 'health-pill ' + h.status;
    document.getElementById('version-pill').textContent = 'v' + h.version;
    document.getElementById('stat-count').textContent = h.camera_count;
    document.getElementById('stat-lan').textContent = h.backends.tuya_lan || 0;
    document.getElementById('stat-cloud').textContent = h.backends.tuya_cloud || 0;
    document.getElementById('stat-rtsp').textContent = h.backends.rtsp || 0;
  } catch (e) {
    document.getElementById('health-pill').textContent = 'error';
    document.getElementById('health-pill').className = 'health-pill degraded';
  }
}

async function loadCameras() {
  const list = document.getElementById('cameras-list');
  try {
    const data = await api('/cameras?include_summary=true&include_state=true');
    if (!data.cameras.length) {
      list.innerHTML = '<div class="empty-state">Keine Cameras hinterlegt. Discovery starten und Cam hinzufuegen.</div>';
      return;
    }
    let html = '<table><thead><tr>';
    html += '<th>ID</th><th>Name</th><th>Host</th><th>Backend</th><th>Stream</th><th>Aktionen</th>';
    html += '</tr></thead><tbody>';
    for (const cam of data.cameras) {
      const backend = cam.backend || 'tuya_lan';
      const stream = cam.stream_url ? '<span style="color: var(--ok)">RTSP</span>' : '<span class="muted">-</span>';
      html += `<tr>
        <td>${cam.id}</td>
        <td>${cam.name}</td>
        <td>${cam.host}</td>
        <td><span class="backend-badge ${backend}">${backend}</span></td>
        <td>${stream}</td>
        <td>
          ${renderInlineToggle(cam.id, 'light', cam.state?.light_on, 'Licht', 'on')}
          ${renderInlineToggle(cam.id, 'motion_switch', cam.state?.motion_armed, 'Motion', 'on')}
          ${renderInlineToggle(cam.id, 'humanoid_filter', cam.state?.ai_person_armed, 'AI-Person', 'on')}
          ${renderInlineToggle(cam.id, 'basic_private', cam.state?.private_mode, 'Privacy', 'private-on')}
          ${renderInlineToggle(cam.id, 'basic_flip', cam.state?.image_flip, 'Flip 180°', 'on')}
          <button class="secondary" onclick="cmdPtz(${cam.id}, 'left')">←</button>
          <button class="secondary" onclick="cmdPtz(${cam.id}, 'right')">→</button>
          <button class="secondary" onclick="cmdPtzStop(${cam.id})" title="Rotation sofort stoppen" style="color:#ff5252">⏹</button>
          <button class="secondary" onclick="cmdHomeGo(${cam.id})" title="zu Home-Position">🏠</button>
          <button class="secondary" onclick="cmdHomeSet(${cam.id})" title="aktuelle Position als Home speichern">📍</button>
          <button class="secondary" onclick="cmdHomeReset(${cam.id})" title="Home-Position + Offset zuruecksetzen">🔄</button>
          <button class="secondary" onclick="cmdSnapshot(${cam.id})">Snap</button>
          <button class="secondary" onclick="cmdSiren(${cam.id})" style="color:#ff9800">🔊 Siren</button>
          <button class="secondary" onclick="cmdCaps(${cam.id})">Caps</button>
          <button class="secondary" onclick="cmdSettings(${cam.id})" title="Alle Cam-Funktionen">⚙️ Settings</button>
        </td>
      </tr>`;
    }
    html += '</tbody></table>';
    list.innerHTML = html;
  } catch (e) {
    list.innerHTML = `<div class="empty-state">Fehler: ${e.message}</div>`;
  }
}

async function runDiscover() {
  const cidr = document.getElementById('cidr-input').value;
  const timeout_s = parseFloat(document.getElementById('timeout-input').value);
  const status = document.getElementById('discover-status');
  const results = document.getElementById('discover-results');
  status.textContent = 'Scanne…';
  results.innerHTML = '';
  try {
    const data = await api('/discover', {
      method: 'POST',
      body: JSON.stringify({ cidr, timeout_s }),
    });
    status.textContent = `${data.total} Hosts, ${data.jarnex_likely_count} jarnex-likely`;
    if (!data.candidates.length) {
      results.innerHTML = '<div class="empty-state">Keine Hosts gefunden.</div>';
      return;
    }
    let html = '<table><thead><tr>';
    html += '<th>IP</th><th>Ports</th><th>Backend-Hint</th><th>Score</th>';
    html += '</tr></thead><tbody>';
    for (const c of data.candidates) {
      html += `<tr>
        <td>${c.ip}</td>
        <td>${(c.open_ports || []).join(', ')}</td>
        <td><span class="backend-badge ${c.likely_backend === 'tuya_lan' || c.likely_backend === 'tuya_with_rtsp' ? 'tuya_lan' : (c.likely_backend === 'rtsp' ? 'rtsp' : '')}">${c.likely_backend}</span></td>
        <td>${c.score}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    results.innerHTML = html;
  } catch (e) {
    status.textContent = 'Fehler: ' + e.message;
  }
}

// Inline-Toggle Helper (Cam-Action-Row Quick-Switches: light/motion/ai/privacy)
function renderInlineToggle(camId, code, value, label, activeClass) {
  const checked = value === true || value === 'true' || value === 1;
  const cls = checked ? activeClass : '';
  const id = `toggle-${camId}-${code}`;
  return `<span class="inline-toggle ${cls}" id="${id}-wrap">
    <small>${label}</small>
    <label class="toggle-switch">
      <input type="checkbox" ${checked ? 'checked' : ''} onchange="setInlineToggle(${camId}, '${code}', '${activeClass}', this.checked)">
      <span class="toggle-slider"></span>
    </label>
  </span>`;
}

async function setInlineToggle(camId, code, activeClass, value) {
  const wrap = document.getElementById(`toggle-${camId}-${code}-wrap`);
  if (wrap) wrap.style.opacity = '0.5';
  try {
    if (code === 'light') {
      // Light hat eigenen Endpoint mit Brightness-Default
      await api(`/cameras/${camId}/light`, {
        method: 'POST',
        body: JSON.stringify({ on: value, brightness: value ? 80 : null }),
      });
    } else {
      // motion_switch, humanoid_filter, basic_private: generisch via /functions/{code}
      await api(`/cameras/${camId}/functions/${code}`, {
        method: 'POST',
        body: JSON.stringify({ value }),
      });
    }
    // Auto-Refresh: nach 600ms Cam-Liste neu rendern (zeigt aktuellen State)
    setTimeout(loadCameras, 600);
  } catch (e) {
    if (wrap) wrap.style.opacity = '1';
    alert(`Fehler beim Umschalten von ${code}: ${e.message}`);
  }
}

async function cmdLight(camId, on) {
  try {
    const result = await api(`/cameras/${camId}/light`, {
      method: 'POST',
      body: JSON.stringify({ on, brightness: on ? 80 : null }),
    });
    // State direkt nach Toggle auslesen — zeigt ob's wirklich gewirkt hat.
    await new Promise(r => setTimeout(r, 600));
    const state = await api(`/cameras/${camId}/state`);
    const actual_on = state?.state?.light_on;
    const ok = actual_on === on;
    alert(
      `Cam ${camId}: Licht ${on ? 'AN' : 'AUS'} angefordert.\n` +
      `Live-State: light_on=${actual_on}\n` +
      (ok ? 'OK' : 'WARNUNG: State stimmt nicht ueberein!')
    );
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function cmdHomeSet(camId) {
  let preview = '';
  try {
    const status = await api(`/cameras/${camId}/home`);
    const curr = Number(status.current_offset_s) || 0;
    preview = `Aktuelles offset: ${curr.toFixed(1)}s ab links-Anschlag.\n`;
    if (status.home_offset_s !== null && status.home_offset_s !== undefined) {
      preview += `Vorheriges Home: ${Number(status.home_offset_s).toFixed(1)}s.\n`;
    }
    preview += '\nTipp: zuerst 🔄 Reset, dann via ← / → zur Wunsch-Position, dann 📍.\n\n';
  } catch (e) { /* ignore */ }
  const ok = confirm(`Aktuelle Cam-Position als Home speichern?\n\n${preview}`);
  if (!ok) return;
  try {
    const r = await api(`/cameras/${camId}/home/set`, { method: 'POST' });
    alert(`Home gespeichert: offset=${r.home_offset_s.toFixed(2)}s ab links-Anschlag.`);
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function cmdHomeGo(camId) {
  let preview = '';
  try {
    const status = await api(`/cameras/${camId}/home`);
    if (status.home_offset_s === null || status.home_offset_s === undefined) {
      alert('Kein Home gesetzt. Zuerst 📍 Set-Home aufrufen.');
      return;
    }
    const home = Number(status.home_offset_s);
    const curr = Number(status.current_offset_s) || 0;
    preview = `Home-Offset: ${home.toFixed(1)}s.\nAktuell: ${curr.toFixed(1)}s.\n\n`;
  } catch (e) { /* ignore */ }
  const ok = confirm(
    `Cam zu Home-Position fahren?\n\n${preview}` +
    'Sequenz: 15s links (Calibrate) -> rechts zur Home-Position.\n' +
    'Gesamt-Dauer: 20-30s.'
  );
  if (!ok) return;
  try {
    const r = await api(`/cameras/${camId}/home/go`, { method: 'POST' });
    alert(`Cam an Home-Position. offset=${r.home_offset_s.toFixed(2)}s`);
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function cmdHomeReset(camId) {
  const ok = confirm(
    'Home-Position UND Offset zuruecksetzen?\n\n' +
    'Danach:\n' +
    '1. ← einmal lang (oder ⏹ stop wenn am Anschlag) -> Cam ist links\n' +
    '2. → mehrmals 1s-Schritte zur Wunsch-Position\n' +
    '3. 📍 Set-Home klickt'
  );
  if (!ok) return;
  try {
    await api(`/cameras/${camId}/home/reset`, { method: 'POST' });
    alert('Home + Offset zurueckgesetzt. Bitte neu Setup machen.');
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function cmdSiren(camId) {
  // Sirene ist LAUT — Confirm-Dialog. Cam-Default-Duration ist 5s (vom Setup-Skript).
  const ok = confirm(
    'Achtung: Sirene wird 5 Sekunden LAUT (~100 dB).\n' +
    'Wirklich ausloesen?\n\n' +
    '(Duration kann vorher per Tuya-App auf 1s reduziert werden)'
  );
  if (!ok) return;
  try {
    const r = await api(`/cameras/${camId}/siren`, {
      method: 'POST',
      body: JSON.stringify({ action: 'play' }),
    });
    let msg = `Cam ${camId}: Siren-Trigger gesendet.\n`;
    if (r.warnings && r.warnings.length) {
      msg += '\nWarnings:\n' + r.warnings.map(w => '- ' + w).join('\n');
    }
    if (r.result && r.result.cloud_sound) {
      msg += '\nCloud-RPC-Sound: OK';
    } else if (!r.warnings || !r.warnings.length) {
      msg += '\n(nur LAN armed-toggle, kein Sound — Cloud-Settings fehlen?)';
    }
    alert(msg);
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function cmdPtz(camId, op) {
  try {
    await api(`/cameras/${camId}/ptz`, {
      method: 'POST',
      body: JSON.stringify({ op, duration_s: 1.0 }),
    });
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function cmdPtzStop(camId) {
  try {
    await api(`/cameras/${camId}/ptz`, {
      method: 'POST',
      body: JSON.stringify({ op: 'stop', duration_s: 0 }),
    });
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function cmdSnapshot(camId) {
  window.open(`${API_BASE}/cameras/${camId}/snapshot`, '_blank');
}

async function cmdCaps(camId) {
  try {
    const data = await api(`/cameras/${camId}/capabilities?refresh=true`);
    alert(JSON.stringify(data.summary, null, 2));
  } catch (e) { alert('Fehler: ' + e.message); }
}

// =========================================================================
// Settings-Modal: dynamic-rendered Functions-Panel
// =========================================================================

let currentSettingsCamId = null;
let currentSettingsCamName = null;

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
  currentSettingsCamId = null;
}

async function cmdSettings(camId) {
  currentSettingsCamId = camId;
  const modal = document.getElementById('settings-modal');
  const body = document.getElementById('settings-body');
  const title = document.getElementById('settings-title');
  title.textContent = `Cam ${camId} — Einstellungen`;
  body.innerHTML = '<div class="empty-state">Lade Functions von Cam...</div>';
  modal.classList.add('open');
  try {
    const data = await api(`/cameras/${camId}/functions`);
    const cams = await api('/cameras');
    const cam = (cams.cameras || cams || []).find(c => c.id === camId);
    currentSettingsCamName = cam ? cam.name : `cam-${camId}`;
    title.textContent = `${currentSettingsCamName} — ${data.count} Funktionen`;
    body.innerHTML = renderFunctions(data.functions || []);
  } catch (e) {
    body.innerHTML = `<div class="empty-state" style="color:#ff5252">Fehler: ${e.message}<br><small>Settings benoetigen Cloud-API-Zugang (tuya_cloud_* in /settings).</small></div>`;
  }
}

function renderFunctions(funcs) {
  const dangerous = funcs.filter(f => f.dangerous);
  const booleans = funcs.filter(f => !f.dangerous && f.type === 'Boolean');
  const enums = funcs.filter(f => !f.dangerous && f.type === 'Enum');
  const integers = funcs.filter(f => !f.dangerous && f.type === 'Integer');
  const strings = funcs.filter(f => !f.dangerous && f.type === 'String');

  let html = '';

  if (booleans.length) {
    html += '<div class="func-section"><h3>Boolean-Toggles (' + booleans.length + ')</h3><div class="func-grid">';
    for (const f of booleans) html += renderBoolRow(f);
    html += '</div></div>';
  }
  if (enums.length) {
    html += '<div class="func-section"><h3>Auswahl (' + enums.length + ')</h3><div class="func-grid">';
    for (const f of enums) html += renderEnumRow(f);
    html += '</div></div>';
  }
  if (integers.length) {
    html += '<div class="func-section"><h3>Werte (' + integers.length + ')</h3><div class="func-grid">';
    for (const f of integers) html += renderIntegerRow(f);
    html += '</div></div>';
  }
  if (strings.length) {
    html += '<div class="func-section"><h3>Text (' + strings.length + ')</h3><div class="func-grid">';
    for (const f of strings) html += renderStringRow(f);
    html += '</div></div>';
  }
  if (dangerous.length) {
    html += '<div class="func-section danger-section"><h3>⚠️ Gefaehrliche Aktionen (' + dangerous.length + ')</h3>';
    html += '<div style="font-size:11px;color:#ff5252;margin-bottom:8px">Diese Aktionen sind nicht-reversibel oder unterbrechen die Cam-Funktion.</div>';
    html += '<div class="func-grid">';
    for (const f of dangerous) html += renderDangerRow(f);
    html += '</div></div>';
  }
  return html || '<div class="empty-state">Keine Functions verfuegbar.</div>';
}

function renderBoolRow(f) {
  const checked = f.current_value === true || f.current_value === 'true' || f.current_value === 1;
  return `<div class="func-row" data-row-code="${f.code}">
    <div class="func-label">${f.name}<small>${f.code}</small></div>
    <div class="func-control">
      <label class="toggle-switch">
        <input type="checkbox" data-func-code="${f.code}" data-func-type="Boolean" ${checked ? 'checked' : ''} onchange="setBooleanFunc(${f.dangerous}, '${f.code}', this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>`;
}

function renderEnumRow(f) {
  const range = (f.values_meta && f.values_meta.range) || [];
  const opts = range.map(v => `<option value="${v}" ${String(v) === String(f.current_value) ? 'selected' : ''}>${v}</option>`).join('');
  return `<div class="func-row" data-row-code="${f.code}">
    <div class="func-label">${f.name}<small>${f.code}</small></div>
    <div class="func-control">
      <select data-func-code="${f.code}" data-func-type="Enum" onchange="setFunc('${f.code}', this.value)">${opts}</select>
    </div>
  </div>`;
}

function renderIntegerRow(f) {
  const meta = f.values_meta || {};
  const min = meta.min ?? 0, max = meta.max ?? 100, step = meta.step ?? 1, unit = meta.unit || '';
  const val = f.current_value ?? min;
  const id = `slider-${f.code}`;
  return `<div class="func-row" data-row-code="${f.code}">
    <div class="func-label">${f.name}<small>${f.code} (${min}-${max}${unit})</small></div>
    <div class="func-control">
      <input type="range" data-func-code="${f.code}" data-func-type="Integer" data-func-unit="${unit}" min="${min}" max="${max}" step="${step}" value="${val}"
        oninput="document.getElementById('${id}-val').textContent = this.value + '${unit}'"
        onchange="setFunc('${f.code}', parseInt(this.value))">
      <span id="${id}-val" class="slider-value">${val}${unit}</span>
    </div>
  </div>`;
}

function renderStringRow(f) {
  const val = f.current_value ?? '';
  // motion_area bekommt einen Canvas-Editor-Button zusaetzlich zum Text-Input
  if (f.code === 'motion_area') {
    return `<div class="func-row" data-row-code="${f.code}" style="grid-column: 1 / -1">
      <div class="func-label">${f.name}<small>${f.code} (Canvas-Editor unten)</small></div>
      <div class="func-control" style="display:flex; gap:6px">
        <input type="text" data-func-code="${f.code}" data-func-type="String" value="${val}" maxlength="${(f.values_meta && f.values_meta.maxlen) || 255}" style="flex:1; min-width:180px"
          onchange="setFunc('${f.code}', this.value)">
        <button class="secondary" onclick="openMotionAreaEditor(${currentSettingsCamId})" style="padding:3px 8px">🎨 Editor</button>
      </div>
    </div>`;
  }
  return `<div class="func-row" data-row-code="${f.code}">
    <div class="func-label">${f.name}<small>${f.code}</small></div>
    <div class="func-control">
      <input type="text" data-func-code="${f.code}" data-func-type="String" value="${val}" maxlength="${(f.values_meta && f.values_meta.maxlen) || 255}"
        onchange="setFunc('${f.code}', this.value)">
    </div>
  </div>`;
}

// =========================================================================
// Motion-Area Canvas-Editor
// =========================================================================
let motionAreaRects = [];  // [{x,y,w,h}] normalisierte 0-1
let motionAreaCanvas = null;
let motionAreaCtx = null;
let motionAreaDrawing = false;
let motionAreaStart = null;

async function openMotionAreaEditor(camId) {
  // Modal mit Snapshot + Canvas
  const existing = document.getElementById('motion-area-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'motion-area-modal';
  modal.className = 'modal-overlay open';
  modal.innerHTML = `
    <div class="modal" style="max-width: 720px">
      <div class="modal-header">
        <h2>Motion-Area Editor — Cam ${camId}</h2>
        <button class="modal-close" onclick="document.getElementById('motion-area-modal').remove()">Schliessen</button>
      </div>
      <div style="margin-bottom:10px; color:#aaa; font-size:12px">
        Klick + drag zeichnet ein Rechteck. Mehrfach klicken fuer mehrere Areas.<br>
        Output-Format: JSON-Array von normalisierten Rechtecken [{x,y,w,h}] (0-1).<br>
        <span style="color:#ff9800">Hinweis:</span> Falls die Cam ein anderes Format erwartet (Hex-Bitmap, ASCII-Grid), wird der Server den String ablehnen — dann manuell im Text-Input setzen.
      </div>
      <div style="position:relative; display:inline-block; border:1px solid #2a323a">
        <img id="motion-area-bg" style="display:block; max-width:680px; max-height:480px" alt="Snapshot laedt...">
        <canvas id="motion-area-canvas" style="position:absolute; top:0; left:0; cursor: crosshair"></canvas>
      </div>
      <div style="margin-top:10px; display:flex; gap:8px; align-items:center">
        <button class="secondary" onclick="clearMotionAreas()">Alle loeschen</button>
        <button class="secondary" onclick="saveMotionAreas(${camId})" style="color:#4caf50">Speichern</button>
        <span id="motion-area-count" style="color:#aaa; font-size:12px"></span>
      </div>
      <details style="margin-top:8px">
        <summary style="font-size:12px; color:#888; cursor:pointer">JSON-Output Preview</summary>
        <pre id="motion-area-json" style="font-size:11px; max-height:120px; overflow:auto">[]</pre>
      </details>
    </div>`;
  document.body.appendChild(modal);

  // Snapshot laden
  const img = document.getElementById('motion-area-bg');
  motionAreaCanvas = document.getElementById('motion-area-canvas');
  motionAreaCtx = motionAreaCanvas.getContext('2d');
  img.onload = () => {
    motionAreaCanvas.width = img.clientWidth;
    motionAreaCanvas.height = img.clientHeight;
    motionAreaRects = [];
    // Parse existing motion_area falls vorhanden
    const existing = document.querySelector(`input[data-func-code="motion_area"]`)?.value || '';
    try {
      const parsed = JSON.parse(existing);
      if (Array.isArray(parsed)) motionAreaRects = parsed.filter(r => typeof r === 'object' && 'x' in r);
    } catch (e) { /* ignore */ }
    redrawMotionAreas();
  };
  img.src = `${API_BASE}/cameras/${camId}/snapshot?t=${Date.now()}`;

  // Mouse-Events
  motionAreaCanvas.onmousedown = (e) => {
    motionAreaDrawing = true;
    const r = motionAreaCanvas.getBoundingClientRect();
    motionAreaStart = { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
  };
  motionAreaCanvas.onmousemove = (e) => {
    if (!motionAreaDrawing) return;
    const r = motionAreaCanvas.getBoundingClientRect();
    const cur = { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
    redrawMotionAreas();
    // Preview rect
    const x = Math.min(motionAreaStart.x, cur.x), y = Math.min(motionAreaStart.y, cur.y);
    const w = Math.abs(cur.x - motionAreaStart.x), h = Math.abs(cur.y - motionAreaStart.y);
    motionAreaCtx.strokeStyle = '#ff9800';
    motionAreaCtx.lineWidth = 2;
    motionAreaCtx.strokeRect(x * motionAreaCanvas.width, y * motionAreaCanvas.height, w * motionAreaCanvas.width, h * motionAreaCanvas.height);
  };
  motionAreaCanvas.onmouseup = (e) => {
    if (!motionAreaDrawing) return;
    motionAreaDrawing = false;
    const r = motionAreaCanvas.getBoundingClientRect();
    const cur = { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
    const x = Math.min(motionAreaStart.x, cur.x), y = Math.min(motionAreaStart.y, cur.y);
    const w = Math.abs(cur.x - motionAreaStart.x), h = Math.abs(cur.y - motionAreaStart.y);
    if (w > 0.02 && h > 0.02) {
      motionAreaRects.push({
        x: Number(x.toFixed(3)), y: Number(y.toFixed(3)),
        w: Number(w.toFixed(3)), h: Number(h.toFixed(3)),
      });
    }
    redrawMotionAreas();
  };
}

function redrawMotionAreas() {
  if (!motionAreaCtx) return;
  motionAreaCtx.clearRect(0, 0, motionAreaCanvas.width, motionAreaCanvas.height);
  motionAreaRects.forEach((rect, i) => {
    motionAreaCtx.strokeStyle = '#4caf50';
    motionAreaCtx.lineWidth = 2;
    motionAreaCtx.fillStyle = 'rgba(76, 175, 80, 0.15)';
    const x = rect.x * motionAreaCanvas.width, y = rect.y * motionAreaCanvas.height;
    const w = rect.w * motionAreaCanvas.width, h = rect.h * motionAreaCanvas.height;
    motionAreaCtx.fillRect(x, y, w, h);
    motionAreaCtx.strokeRect(x, y, w, h);
    motionAreaCtx.fillStyle = '#4caf50';
    motionAreaCtx.fillText(`#${i + 1}`, x + 4, y + 12);
  });
  document.getElementById('motion-area-count').textContent = `${motionAreaRects.length} Area(s)`;
  document.getElementById('motion-area-json').textContent = JSON.stringify(motionAreaRects, null, 2);
}

function clearMotionAreas() {
  motionAreaRects = [];
  redrawMotionAreas();
}

async function saveMotionAreas(camId) {
  const json = JSON.stringify(motionAreaRects);
  if (json.length > 255) {
    alert(`Output ist ${json.length} chars, max 255 erlaubt. Bitte weniger oder kleinere Areas.`);
    return;
  }
  try {
    await api(`/cameras/${camId}/functions/motion_area`, {
      method: 'POST',
      body: JSON.stringify({ value: json }),
    });
    alert(`Gespeichert: ${motionAreaRects.length} Areas\nWert: ${json}\n\nFalls Cam das Format nicht akzeptiert: in der App eine Area setzen, dann Server-Wert in /functions/status checken um echtes Format zu lernen.`);
    document.getElementById('motion-area-modal').remove();
    refreshSettingsValues();
  } catch (e) { alert('Fehler: ' + e.message); }
}

function renderDangerRow(f) {
  return `<div class="func-row danger">
    <div class="func-label">${f.name}<small>${f.code}</small></div>
    <div class="func-control">
      <button class="danger-action-btn" onclick="triggerDangerAction('${f.code}', '${f.name}')">Ausfuehren</button>
    </div>
  </div>`;
}

async function setFunc(code, value) {
  const row = document.querySelector(`.func-row[data-row-code="${code}"]`);
  if (row) row.style.opacity = '0.5';
  try {
    await api(`/cameras/${currentSettingsCamId}/functions/${code}`, {
      method: 'POST',
      body: JSON.stringify({ value }),
    });
    // Auto-Refresh: nach 500ms Cloud-Settle-Time die Werte erneuern
    setTimeout(() => refreshSettingsValues(code, value), 500);
  } catch (e) {
    if (row) row.style.opacity = '1';
    alert(`Fehler bei ${code}=${value}: ${e.message}`);
  }
}

async function refreshSettingsValues(expectedCode, expectedValue) {
  try {
    const data = await api(`/cameras/${currentSettingsCamId}/functions/status`);
    const values = data.values || {};
    document.querySelectorAll('[data-func-code]').forEach(el => {
      const code = el.dataset.funcCode;
      const newVal = values[code];
      if (newVal === undefined || newVal === null) return;
      const type = el.dataset.funcType;
      if (type === 'Boolean') {
        el.checked = newVal === true || newVal === 'true' || newVal === 1;
      } else if (type === 'Enum') {
        el.value = String(newVal);
      } else if (type === 'Integer') {
        el.value = newVal;
        const valSpan = document.getElementById(`slider-${code}-val`);
        if (valSpan) valSpan.textContent = newVal + (el.dataset.funcUnit || '');
      } else if (type === 'String') {
        el.value = newVal;
      }
      // Row Opacity zurueck + Mismatch-Indikator
      const row = document.querySelector(`.func-row[data-row-code="${code}"]`);
      if (row) {
        row.style.opacity = '1';
        if (expectedCode === code && String(newVal) !== String(expectedValue)) {
          // Server-Wert weicht ab vom angefragten Wert → kurz rot blinken
          row.style.boxShadow = '0 0 0 2px #ff5252';
          setTimeout(() => { row.style.boxShadow = ''; }, 1500);
        }
      }
    });
  } catch (e) {
    // Refresh failed → alle disabled rows wieder normal
    document.querySelectorAll('.func-row[style*="opacity"]').forEach(r => r.style.opacity = '1');
  }
}

async function setBooleanFunc(dangerous, code, value) {
  // dangerous-Booleans laufen NICHT durch hier — die haben Action-Button
  await setFunc(code, value);
}

async function triggerDangerAction(code, name) {
  const first = confirm(
    `GEFAEHRLICHE AKTION: "${name}" (${code})\n\n` +
    'Diese Aktion kann nicht rueckgaengig gemacht werden ODER unterbricht die Cam.\n\n' +
    'Trotzdem fortfahren?'
  );
  if (!first) return;
  const token = prompt(
    `Zur Bestaetigung tippe den Cam-Namen exakt ein:\n\n"${currentSettingsCamName}"`
  );
  if (token !== currentSettingsCamName) {
    alert('Cam-Name stimmt nicht. Aktion abgebrochen.');
    return;
  }
  try {
    const r = await api(`/cameras/${currentSettingsCamId}/functions/${code}`, {
      method: 'POST',
      body: JSON.stringify({ value: true }),
    });
    alert(`"${name}" ausgefuehrt.\n${JSON.stringify(r.result || {}, null, 2).slice(0, 200)}`);
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function alarmsStart() {
  try {
    await api('/alarms/start', { method: 'POST' });
    refreshAlarmStatus();
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function alarmsStop() {
  try {
    await api('/alarms/stop', { method: 'POST' });
    refreshAlarmStatus();
  } catch (e) { alert('Fehler: ' + e.message); }
}

async function refreshAlarmStatus() {
  try {
    const s = await api('/alarms/status');
    document.getElementById('alarms-status-text').textContent =
      `Running: ${s.running}, Tasks: ${s.active_tasks}, Events: ${s.events_total}, Errors: ${s.errors_total}, Cloud-Fallbacks: ${s.cloud_fallbacks}`;
    document.getElementById('alarms-status-json').textContent = JSON.stringify(s, null, 2);
  } catch (e) {
    document.getElementById('alarms-status-text').textContent = 'Fehler: ' + e.message;
  }
}

async function refreshEvents() {
  const list = document.getElementById('events-list');
  try {
    const data = await api('/alarms/recent?limit=20');
    if (!data.events.length) {
      list.innerHTML = '<div class="empty-state">Keine Events.</div>';
      return;
    }
    let html = '<table><thead><tr><th>Zeit</th><th>Cam</th><th>Label</th><th>Backend</th><th>Score</th></tr></thead><tbody>';
    for (const ev of data.events) {
      html += `<tr>
        <td>${new Date(ev.ts * 1000).toLocaleString()}</td>
        <td>${ev.cam_id}</td>
        <td><strong>${ev.label}</strong></td>
        <td><span class="backend-badge ${ev.source_backend}">${ev.source_backend}</span></td>
        <td>${ev.score ?? '-'}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    list.innerHTML = html;
  } catch (e) {
    list.innerHTML = `<div class="empty-state">Fehler: ${e.message}</div>`;
  }
}

loadHealth();
loadCameras();
refreshAlarmStatus();
refreshEvents();
</script>
